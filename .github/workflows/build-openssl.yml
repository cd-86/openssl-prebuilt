name: Build OpenSSL packages

on:
  push:
    branches:
      - main
    tags:
      - "openssl-*-msvc-x64-static-*"
      - "openssl-*-msvc-x64-shared-*"
      - "openssl-*-linux-x64-static-*"
      - "openssl-*-linux-x64-shared-*"
  workflow_dispatch:
    inputs:
      openssl_ref:
        description: "OpenSSL git ref or tag to build, for example openssl-3.5.6"
        required: true
        default: "openssl-3.5.6"
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

env:
  DEFAULT_OPENSSL_REF: openssl-3.5.6

jobs:
  resolve:
    name: Resolve OpenSSL ref
    runs-on: windows-latest
    outputs:
      openssl_ref: ${{ steps.resolve.outputs.openssl_ref }}
      openssl_version: ${{ steps.resolve.outputs.openssl_version }}
    steps:
      - name: Resolve requested ref
        id: resolve
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ref = "${{ inputs.openssl_ref }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^(openssl-\d+\.\d+\.\d+)-(msvc|linux)-x64-(static|shared)-\d+$') {
              throw "Tag '$tag' must look like openssl-3.5.6-msvc-x64-static-1 or openssl-3.5.6-linux-x64-static-1."
            }
            $ref = $Matches[1]
          } else {
            $ref = $env:DEFAULT_OPENSSL_REF
          }

          if ([string]::IsNullOrWhiteSpace($ref)) {
            throw "OpenSSL ref is empty."
          }

          $version = $ref -replace '^openssl-', ''
          "openssl_ref=$ref" >> $env:GITHUB_OUTPUT
          "openssl_version=$version" >> $env:GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.linkage }}
    needs: resolve
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - linkage: static
            configure_options: no-shared no-module no-tests no-docs no-asm
          - linkage: shared
            configure_options: no-tests no-docs no-asm
    steps:
      - name: Ensure Perl is available
        run: |
          if (-not (Get-Command perl -ErrorAction SilentlyContinue)) {
            choco install strawberryperl -y --no-progress
            $env:Path = "C:\Strawberry\perl\bin;$env:Path"
            "C:\Strawberry\perl\bin" >> $env:GITHUB_PATH
          }
          perl -v

      - name: Checkout OpenSSL source
        run: |
          git clone --depth 1 --branch "${{ needs.resolve.outputs.openssl_ref }}" https://github.com/openssl/openssl.git openssl-src

      - name: Configure and build OpenSSL
        working-directory: openssl-src
        env:
          INSTALL_DIR: ${{ github.workspace }}\install\openssl-windows-x64-${{ matrix.linkage }}
          CONFIGURE_OPTIONS: ${{ matrix.configure_options }}
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products "*" -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath)) {
            throw "Visual Studio Build Tools with MSVC x64 support were not found."
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          if (-not (Test-Path $vcvars)) {
            throw "vcvars64.bat was not found at '$vcvars'."
          }

          $prefix = $env:INSTALL_DIR -replace '\\', '/'
          $options = ($env:CONFIGURE_OPTIONS -split ' ') -join ' '
          $configure = "perl Configure VC-WIN64A $options --prefix=`"$prefix`" --openssldir=`"$prefix/ssl`""
          $commands = @(
            "call `"$vcvars`"",
            $configure,
            "nmake",
            "nmake install_sw"
          ) -join " && "

          & cmd.exe /d /s /c $commands
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package OpenSSL
        env:
          LINKAGE: ${{ matrix.linkage }}
          OPENSSL_VERSION: ${{ needs.resolve.outputs.openssl_version }}
        run: |
          $packageRootName = "openssl-windows-x64-$env:LINKAGE"
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "install\$packageRootName"
          if (-not (Test-Path (Join-Path $packageRoot "include\openssl\ssl.h"))) {
            throw "Installed OpenSSL headers were not found under '$packageRoot'."
          }
          if (-not (Test-Path (Join-Path $packageRoot "lib"))) {
            throw "Installed OpenSSL libraries were not found under '$packageRoot'."
          }

          if ($env:LINKAGE -eq "static") {
            $dlls = @(Get-ChildItem -Path $packageRoot -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue)
            if ($dlls.Count -gt 0) {
              $dlls | ForEach-Object { Write-Host "Unexpected DLL in static package: $($_.FullName)" }
              throw "Static package unexpectedly contains DLL files."
            }
            $staticBinDir = Join-Path $packageRoot "bin"
            if (Test-Path $staticBinDir) {
              Remove-Item -LiteralPath $staticBinDir -Recurse -Force
            }
          } else {
            $binDir = Join-Path $packageRoot "bin"
            $cryptoDll = @(Get-ChildItem -Path $binDir -Filter "libcrypto*.dll" -ErrorAction SilentlyContinue)
            $sslDll = @(Get-ChildItem -Path $binDir -Filter "libssl*.dll" -ErrorAction SilentlyContinue)
            if ($cryptoDll.Count -eq 0 -or $sslDll.Count -eq 0) {
              throw "Shared package does not contain libcrypto/libssl DLL files under '$binDir'."
            }
          }

          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $zipName = "openssl-$env:OPENSSL_VERSION-windows-x64-$env:LINKAGE.zip"
          $zipPath = Join-Path $dist $zipName
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -LiteralPath $packageRoot -DestinationPath $zipPath -CompressionLevel Optimal

          $sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath).Hash.ToLowerInvariant()
          "$sha256  $zipName" | Set-Content -Encoding ascii -Path "$zipPath.sha256"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-${{ needs.resolve.outputs.openssl_version }}-windows-x64-${{ matrix.linkage }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  build_linux:
    name: Build Linux ${{ matrix.linkage }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - linkage: static
            configure_options: no-shared no-module no-tests no-docs no-asm
          - linkage: shared
            configure_options: no-tests no-docs no-asm
    steps:
      - name: Checkout OpenSSL source
        run: |
          git clone --depth 1 --branch "${{ needs.resolve.outputs.openssl_ref }}" https://github.com/openssl/openssl.git openssl-src
        shell: bash

      - name: Configure and build OpenSSL
        working-directory: openssl-src
        env:
          INSTALL_DIR: ${{ github.workspace }}/install/openssl-linux-x64-${{ matrix.linkage }}
          CONFIGURE_OPTIONS: ${{ matrix.configure_options }}
        run: |
          set -euo pipefail
          ./Configure linux-x86_64 $CONFIGURE_OPTIONS --prefix="$INSTALL_DIR" --openssldir="$INSTALL_DIR/ssl" --libdir=lib
          make -j"$(nproc)"
          make install_sw
        shell: bash

      - name: Package OpenSSL
        env:
          LINKAGE: ${{ matrix.linkage }}
          OPENSSL_VERSION: ${{ needs.resolve.outputs.openssl_version }}
        run: |
          set -euo pipefail

          package_root_name="openssl-linux-x64-$LINKAGE"
          package_root="$GITHUB_WORKSPACE/install/$package_root_name"

          test -f "$package_root/include/openssl/ssl.h"
          test -d "$package_root/lib"

          if [[ "$LINKAGE" == "static" ]]; then
            if find "$package_root" -type f -name "*.so*" | grep -q .; then
              echo "Static package unexpectedly contains shared objects."
              find "$package_root" -type f -name "*.so*"
              exit 1
            fi
          else
            compgen -G "$package_root/lib/libcrypto.so*" > /dev/null || (echo "Shared package missing libcrypto.so" && exit 1)
            compgen -G "$package_root/lib/libssl.so*" > /dev/null || (echo "Shared package missing libssl.so" && exit 1)
          fi

          dist="$GITHUB_WORKSPACE/dist"
          mkdir -p "$dist"

          zip_name="openssl-$OPENSSL_VERSION-linux-x64-$LINKAGE.zip"
          zip_path="$dist/$zip_name"
          rm -f "$zip_path"

          (
            cd "$GITHUB_WORKSPACE/install"
            zip -qr "$zip_path" "$package_root_name"
          )

          sha256=$(sha256sum "$zip_path" | awk '{print $1}')
          printf "%s  %s\n" "$sha256" "$zip_name" > "$zip_path.sha256"
        shell: bash

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-${{ needs.resolve.outputs.openssl_version }}-linux-x64-${{ matrix.linkage }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish release
    if: ${{ github.ref_type == 'tag' }}
    needs:
      - resolve
      - build
      - build_linux
    runs-on: windows-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENSSL_REF: ${{ needs.resolve.outputs.openssl_ref }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $assetFiles = @(Get-ChildItem -Path release-assets -Recurse -File | Where-Object {
            $_.Name -like "*.zip" -or $_.Name -like "*.sha256"
          })
          if ($assetFiles.Count -lt 8) {
            Get-ChildItem -Path release-assets -Recurse | Format-Table -AutoSize
            throw "Expected static/shared zip and sha256 files for Windows and Linux."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          OpenSSL ref: $env:OPENSSL_REF

          Platforms:
          - Windows x64 MSVC
          - Linux x64

          Packages:
          - static: no-shared no-module no-tests no-docs no-asm
          - shared: no-tests no-docs no-asm
          "@ | Set-Content -Encoding utf8 -Path $notesPath

          $assets = @($assetFiles | ForEach-Object { $_.FullName })
          gh release view $env:TAG_NAME --repo $env:GITHUB_REPOSITORY > $null 2>&1
          if ($LASTEXITCODE -eq 0) {
            & gh release upload $env:TAG_NAME @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            & gh release create $env:TAG_NAME @assets --repo $env:GITHUB_REPOSITORY --title $env:TAG_NAME --notes-file $notesPath
          }
